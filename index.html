<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<link rel="icon" href="icon-192.png" sizes="192x192" type="image/png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שקל לשקל - ניהול תקציב חכם</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

<style>
body{margin:0;font-family:Arial;background:#f4f7f6;color:#333;transition:.3s}
header{padding:25px;text-align:center;font-size:30px;font-weight:bold;color:#1b5e20}
nav{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:15px;background:#fff;position:sticky;top:0}
button{padding:8px 14px;border:none;border-radius:8px;background:#2e7d32;color:#fff;cursor:pointer}
button.red{background:#c62828}
button.gray{background:#555}
button.blue{background:#1565c0}
.edit-btn{background:#ffa000}
.delete-btn{background:#d32f2f}
.section{display:none;padding:20px;max-width:1100px;margin:auto}
.section.active{display:block}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px}
input{width:100%;padding:8px;margin:5px 0}
.table-container{max-height:350px;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border-bottom:1px solid #ddd;padding:6px;text-align:center}
.dark{background:#121212;color:#eee}
.dark .card{background:#1e1e1e}
.toggle-btn{margin-top:10px;background:#1565c0}
</style>
</head>
<body>

<header>שקל לשקל</header>

<nav>
<button onclick="showSection('dashboard')">📊 מצב אישי</button>
<button onclick="showSection('income_section')">💰 הכנסות והוצאות</button>
<button onclick="showSection('loan_section')">💳 הלוואה</button>
<button onclick="showSection('mortgage_section')">🏠 משכנתא</button>
<button onclick="toggleDark()" class="gray">🌙 מצב כהה</button>
<button onclick="resetAll()" class="red">🧹 איפוס</button>
<button id="installBtn" class="blue">⬇️ התקן</button>
</nav>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<div class="card">
<h3>סיכום תקציב</h3>
<div id="dash_stats"></div>
</div>
</div>

<!-- INCOME -->
<div id="income_section" class="section">
<div class="card">
<h3>ניהול הכנסות</h3>
<input type="text" id="inc_name" placeholder="מקור הכנסה">
<input type="number" id="inc_val" placeholder="סכום">
<button onclick="addItem('incomes')">➕ הוסף</button>
<div id="inc_table" class="table-container"></div>
</div>

<div class="card">
<h3>ניהול הוצאות</h3>
<input type="text" id="exp_name" placeholder="שם ההוצאה">
<input type="number" id="exp_val" placeholder="סכום">
<button onclick="addItem('expenses')">➕ הוסף</button>
<div id="exp_table" class="table-container"></div>
</div>
</div>

<!-- LOAN -->
<div id="loan_section" class="section">
<div class="card">
<h3>מחשבון הלוואה</h3>
<input type="number" id="l_amt" placeholder="סכום" oninput="calcLoan()">
<input type="number" id="l_rt" placeholder="ריבית שנתית %" oninput="calcLoan()">
<input type="number" id="l_yrs" placeholder="שנים" oninput="calcLoan()">
<div id="l_res" style="margin:10px 0;font-weight:bold"></div>
<div id="l_tbl" class="table-container"></div>
<button id="loanToggleBtn" class="toggle-btn" onclick="toggleLoanSchedule()" style="display:none"></button>
</div>
</div>

<!-- MORTGAGE -->
<div id="mortgage_section" class="section">
<div class="card">
<h3>משכנתא - 3 מסלולים</h3>
<div id="m_tracks"></div>
<div id="m_res"></div>
</div>
</div>

<script>
if('serviceWorker' in navigator){
window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js'));
}

let incomes=[],expenses=[];
let loanMonthly=0,mortMonthly=0;
let loanSchedule=[],showLoanAll=false;
let mSchedules=[[],[],[]],mShow=[false,false,false];

/* ---------- UI ---------- */
function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
function toggleDark(){document.body.classList.toggle('dark');}

/* ---------- PMT ---------- */
function pmt(P,r,n){
if(P<=0||n<=0)return 0;
if(r===0)return P/n;
return(P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
}

/* ---------- INCOME / EXPENSE ---------- */
function addItem(type){
const pre=type==='incomes'?'inc':'exp';
const name=document.getElementById(pre+'_name').value;
const val=+document.getElementById(pre+'_val').value;
if(!name||!val)return;
(type==='incomes'?incomes:expenses).push({name,val});
document.getElementById(pre+'_name').value="";
document.getElementById(pre+'_val').value="";
refreshTables();
}
function deleteItem(type,i){
(type==='incomes'?incomes:expenses).splice(i,1);
refreshTables();
}
function editItem(type,i){
const list=type==='incomes'?incomes:expenses;
const n=prompt("שם חדש:",list[i].name);
const v=prompt("סכום חדש:",list[i].val);
if(n)list[i].name=n;
if(v)list[i].val=+v;
refreshTables();
}
function renderTable(type){
const list=type==='incomes'?incomes:expenses;
const container=document.getElementById(type==='incomes'?'inc_table':'exp_table');
if(!list.length){container.innerHTML="אין נתונים";return;}
let h="<table><tr><th>שם</th><th>סכום</th><th>פעולות</th></tr>";
list.forEach((item,i)=>{
h+=`<tr>
<td>${item.name}</td>
<td>${item.val.toLocaleString()} ₪</td>
<td>
<button class="edit-btn" onclick="editItem('${type}',${i})">✏️</button>
<button class="delete-btn" onclick="deleteItem('${type}',${i})">🗑️</button>
</td>
</tr>`;
});
container.innerHTML=h+"</table>";
}
function refreshTables(){
renderTable('incomes');
renderTable('expenses');
saveToLocal();
updateDash();
}

/* ---------- DASH ---------- */
function updateDash(){
const totalInc=incomes.reduce((a,b)=>a+b.val,0);
const totalExp=expenses.reduce((a,b)=>a+b.val,0);
const totalDebt=loanMonthly+mortMonthly;
const avail=totalInc-totalExp-totalDebt;
dash_stats.innerHTML=
`הכנסות: ${totalInc.toLocaleString()} ₪<br>
הוצאות: ${totalExp.toLocaleString()} ₪<br>
חובות: ${totalDebt.toLocaleString()} ₪<br>
<strong>פנוי: ${avail.toLocaleString()} ₪</strong>`;
dash_stats.style.color=avail>=0?"green":"red";
}

/* ---------- LOCAL STORAGE ---------- */
function saveToLocal(){
const data={incomes,expenses};
localStorage.setItem("financeData",JSON.stringify(data));
}
window.onload=()=>{
const d=JSON.parse(localStorage.getItem("financeData"));
if(d){
incomes=d.incomes||[];
expenses=d.expenses||[];
}
refreshTables();
initMortgage();
};
</script>
</body>
</html>
