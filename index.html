<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<link rel="icon" href="icon-192.png" sizes="192x192" type="image/png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שקל לשקל - ניהול תקציב חכם</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

<style>
body { margin:0;font-family:Arial;background:#f4f7f6;color:#333;transition:.3s;}
header{padding:20px;text-align:center;font-size:28px;font-weight:bold;color:#1b5e20;}
nav{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:10px;background:#fff;position:sticky;top:0;z-index:1000}
button{padding:8px 14px;border:none;border-radius:8px;background:#2e7d32;color:#fff;cursor:pointer}
button.red{background:#c62828}
button.gray{background:#555}
.section{display:none;padding:20px;max-width:900px;margin:auto}
.section.active{display:block}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
input{width:100%;padding:8px;margin:5px 0}
.table-container{max-height:350px;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border-bottom:1px solid #ddd;padding:6px;text-align:center}
.dark{background:#121212;color:#eee}
.dark .card{background:#1e1e1e}
.show-more{margin-top:10px;background:#1565c0}
</style>
</head>
<body>

<header>שקל לשקל</header>

<nav>
<button onclick="showSection('dashboard')">📊 מצב אישי</button>
<button onclick="showSection('loan_section')">💳 הלוואה</button>
<button onclick="toggleDark()" class="gray">🌙 מצב כהה</button>
</nav>

<div id="dashboard" class="section active">
<div class="card">
<h3>סיכום</h3>
<div id="dash_stats"></div>
</div>
</div>

<div id="loan_section" class="section">
<div class="card">
<h3>מחשבון הלוואה</h3>
<input type="number" id="l_amt" placeholder="סכום" oninput="calcLoan()">
<input type="number" id="l_rt" placeholder="ריבית שנתית %" oninput="calcLoan()">
<input type="number" id="l_yrs" placeholder="שנים" oninput="calcLoan()">
<div id="l_res" style="margin:10px 0;font-weight:bold"></div>
<div id="l_tbl" class="table-container"></div>
<button id="showMoreBtn" class="show-more" onclick="toggleFullSchedule()" style="display:none">הצג עוד</button>
</div>
</div>

<script>
const CACHE_VERSION = "v2";
let fullSchedule = [];
let showAll = false;

if('serviceWorker' in navigator){
window.addEventListener('load',()=>{
navigator.serviceWorker.register('sw.js');
});
}

function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function toggleDark(){
document.body.classList.toggle('dark');
}

function pmt(P,r,n){
if(P<=0||n<=0) return 0;
if(r===0) return P/n;
return (P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
}

function calcLoan(){
const P=+l_amt.value||0;
const r=(+l_rt.value/100)/12;
const n=(+l_yrs.value)*12;
if(!P||!n){l_tbl.innerHTML="";l_res.innerText="";return;}

const pay=pmt(P,r,n);
l_res.innerText="החזר חודשי: "+pay.toFixed(2)+" ₪";

let bal=P;
fullSchedule=[];
for(let i=1;i<=n;i++){
let intr=bal*r;
let prn=pay-intr;
bal-=prn;
fullSchedule.push({
month:i,
pay:pay,
intr:intr,
prn:prn,
bal:Math.max(0,bal)
});
if(bal<=0) break;
}

renderSchedule();
}

function renderSchedule(){
if(!fullSchedule.length){l_tbl.innerHTML="";return;}
let limit=showAll?fullSchedule.length:12;
let h="<table><tr><th>חודש</th><th>תשלום</th><th>ריבית</th><th>קרן</th><th>יתרה</th></tr>";
for(let i=0;i<limit;i++){
let row=fullSchedule[i];
h+=`<tr>
<td>${row.month}</td>
<td>${row.pay.toFixed(0)}</td>
<td>${row.intr.toFixed(0)}</td>
<td>${row.prn.toFixed(0)}</td>
<td>${row.bal.toFixed(0)}</td>
</tr>`;
}
h+="</table>";
l_tbl.innerHTML=h;

document.getElementById("showMoreBtn").style.display =
fullSchedule.length>12?"block":"none";

document.getElementById("showMoreBtn").innerText =
showAll?"הצג פחות":"הצג עוד";
}

function toggleFullSchedule(){
showAll=!showAll;
renderSchedule();
}
</script>
</body>
</html>
