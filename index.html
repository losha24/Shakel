<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <link rel="icon" href="icon-192.png" sizes="192x192" type="image/png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שקל לשקל - ניהול תקציב חכם</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
body { margin: 0; font-family: 'Assistant', sans-serif; background: #f4f7f6; color: #333; transition: 0.3s; min-height: 100vh; }
header { padding: 20px 20px 5px 20px; text-align: center; font-size: 32px; font-weight: 700; color: #1b5e20; }
.logo-container { display: flex; justify-content: center; padding-bottom: 15px; }
.logo-container img { width: 70px; height: 70px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

nav { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 12px; background: #fff; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
button { padding: 10px 14px; border: none; border-radius: 10px; background: linear-gradient(45deg,#43a047,#2e7d32); color: white; cursor: pointer; font-weight: 600; display:flex; align-items:center; gap:5px; font-size: 14px; white-space: nowrap; transition: 0.2s; }
button:active { transform: scale(0.95); }

button.red { background: linear-gradient(45deg,#e53935,#c62828); }
button.blue { background: linear-gradient(45deg,#1e88e5,#1565c0); }
button.gray { background: linear-gradient(45deg,#757575,#424242); }

.section { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
.section.active { display: block; }
.card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }

/* דאשבורד ממורכז */
.dash-container { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 15px; }
.chart-box { width: 180px; height: 180px; margin: 0 auto; }

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; }

table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: center; }

.action-btn { padding: 6px 10px; border-radius: 8px; border: none; color: white; cursor: pointer; }
.edit-btn { background: #ffa000; margin-left: 5px; }
.delete-btn { background: #d32f2f; }

.toggle-tbl-btn { background: #607d8b; margin: 10px 0; width: 100%; justify-content: center; color: white; border-radius: 8px; padding: 12px; border: none; cursor: pointer; }
.table-content { display: none; margin-top: 10px; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
.table-content.show { display: block; }
.show-more-row { background: #f0f4f8; cursor: pointer; color: #1565c0; font-weight: bold; }

.dark { background: #1a1a1a; color: #eee; }
.dark .card { background: #252525; color: #eee; }
.dark nav { background: #252525; }
.dark input { background: #333; color: #eee; border-color: #444; }
footer { text-align: center; padding: 20px; color: #888; font-size: 13px; }
</style>
</head>
<body>

<header>שקל לשקל</header>
<div class="logo-container"><img src="icon-192.png" alt="לוגו"></div>

<nav>
    <button onclick="showSection('dashboard')">📊 מצב אישי</button>
    <button onclick="showSection('income_section')">💰 תקציב</button>
    <button onclick="showSection('loan_section')">💳 הלוואה</button>
    <button onclick="showSection('mortgage_section')">🏠 משכנתא</button>
    <button onclick="toggleDark()" class="red">🌙 מצב לילה</button>
    <button onclick="resetAll()" class="gray">🧹 איפוס</button>
    <button id="installBtn" class="blue">⬇️ התקנה</button>
</nav>

<div id="dashboard" class="section active">
    <div class="card">
        <h3 style="text-align: center; color: #1b5e20;">סיכום תקציב חודשי</h3>
        <div class="dash-container">
            <div id="dash_stats" style="font-size: 18px; font-weight: bold; line-height: 2.2;"></div>
            <div class="chart-box"><canvas id="budgetChart"></canvas></div>
        </div>
    </div>
</div>

<div id="income_section" class="section">
    <div class="card">
        <h3>הכנסות והוצאות</h3>
        <div class="grid">
            <div>
                <label>הכנסה</label>
                <div style="display:flex; gap:5px;"><input type="text" id="inc_name" placeholder="מקור"><input type="number" id="inc_val" placeholder="₪"><button onclick="addItem('incomes')">➕</button></div>
                <div id="inc_table"></div>
            </div>
            <div>
                <label>הוצאה</label>
                <div style="display:flex; gap:5px;"><input type="text" id="exp_name" placeholder="שם"><input type="number" id="exp_val" placeholder="₪"><button onclick="addItem('expenses')">➕</button></div>
                <div id="exp_table"></div>
            </div>
        </div>
    </div>
</div>

<div id="loan_section" class="section">
    <div class="card">
        <h3>מחשבון הלוואה</h3>
        <div class="grid">
            <input type="number" id="l_amt" placeholder="סכום הלוואה" oninput="calcLoan();">
            <input type="number" id="l_rt" placeholder="ריבית %" oninput="calcLoan();">
            <input type="number" id="l_yrs" placeholder="תקופה בשנים" oninput="calcLoan();">
        </div>
        <div id="l_res" style="font-size: 20px; color: #d32f2f; margin: 15px 0; font-weight: bold; text-align:center;"></div>
        <div id="l_tbl_area"></div>
    </div>
</div>

<div id="mortgage_section" class="section">
    <div class="card">
        <h3>מחשבון משכנתא - 3 מסלולים</h3>
        <div id="m_tracks">
            <div class="card"><h4>מסלול 1</h4><div class="grid"><input type="number" id="m_a1" placeholder="סכום" oninput="calcM();"><input type="number" id="m_r1" placeholder="%" oninput="calcM();"><input type="number" id="m_y1" placeholder="שנים" oninput="calcM();"></div></div>
            <div class="card"><h4>מסלול 2</h4><div class="grid"><input type="number" id="m_a2" placeholder="סכום" oninput="calcM();"><input type="number" id="m_r2" placeholder="%" oninput="calcM();"><input type="number" id="m_y2" placeholder="שנים" oninput="calcM();"></div></div>
            <div class="card"><h4>מסלול 3</h4><div class="grid"><input type="number" id="m_a3" placeholder="סכום" oninput="calcM();"><input type="number" id="m_r3" placeholder="%" oninput="calcM();"><input type="number" id="m_y3" placeholder="שנים" oninput="calcM();"></div></div>
        </div>
        <div id="m_res_summary" style="font-size: 18px; font-weight: bold; text-align: center; margin-top: 10px; background: #e8f5e9; padding: 10px; border-radius: 10px;"></div>
        <div id="m_tbl_area"></div>
    </div>
</div>

<footer>&copy; 2026 אלכסיי זבודיסקר</footer>

<script>
let incomes=[], expenses=[], loanMonthly=0, mortMonthly=0;
let myChart = null;
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });

document.getElementById('installBtn').addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') deferredPrompt = null;
    } else {
        alert("האפליקציה כבר מותקנת או שהדפדפן לא תומך בהתקנה ישירה.");
    }
});

function showSection(id){ document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function toggleDark(){ document.body.classList.toggle('dark'); }
function pmt(P,r,n){ if(P<=0||n<=0) return 0; if(r===0) return P/n; return (P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1); }

function createAmortizationTable(P, r, n) {
    if (!P || n <= 0) return "";
    let pay = pmt(P, r, n);
    let bal = P;
    let html = `<button class="toggle-tbl-btn" onclick="this.nextElementSibling.classList.toggle('show')">📋 לוח סילוקין</button>
                <div class="table-content"><table><tr><th>חודש</th><th>תשלום</th><th>יתרה</th></tr>`;
    for (let i = 1; i <= n; i++) {
        bal -= (pay - (bal * r));
        let hiddenClass = i > 12 ? 'class="extra-row" style="display:none"' : '';
        html += `<tr ${hiddenClass}><td>${i}</td><td>${pay.toFixed(0)}</td><td>${Math.max(0, bal).toFixed(0)}</td></tr>`;
        if (i === 12 && n > 12) html += `<tr class="show-more-row" onclick="showAllRows(this)"> <td colspan="3">הצג עוד חודשים...</td> </tr>`;
    }
    return html + `</table></div>`;
}

function showAllRows(btn) {
    const table = btn.closest('table');
    table.querySelectorAll('.extra-row').forEach(row => row.style.display = 'table-row');
    btn.style.display = 'none';
}

function addItem(type){
    const pre=type==='incomes'?'inc':'exp';
    const name=document.getElementById(pre+'_name').value, val=+document.getElementById(pre+'_val').value;
    if(!name||!val) return;
    (type==='incomes'?incomes:expenses).push({name,val});
    document.getElementById(pre+'_name').value=""; document.getElementById(pre+'_val').value="";
    refresh();
}

function editItem(type, idx){
    const list = type==='incomes' ? incomes : expenses;
    const n = prompt("שם חדש:", list[idx].name), v = prompt("סכום חדש:", list[idx].val);
    if(n && v && !isNaN(v)){ list[idx].name = n; list[idx].val = Number(v); refresh(); }
}

function deleteItem(type,idx){ (type==='incomes'?incomes:expenses).splice(idx,1); refresh(); }

function renderItemsTable(type){
    const list=type==='incomes'?incomes:expenses;
    const container=document.getElementById(type==='incomes'?'inc_table':'exp_table');
    if(!list.length){ container.innerHTML=""; return; }
    let h=`<table><tr><th>שם</th><th>₪</th><th>פעולות</th></tr>`;
    list.forEach((item,i)=> h+=`<tr><td>${item.name}</td><td>${item.val.toLocaleString()}</td>
        <td><button class="action-btn edit-btn" onclick="editItem('${type}',${i})">✏️</button>
        <button class="action-btn delete-btn" onclick="deleteItem('${type}',${i})">🗑️</button></td></tr>`);
    container.innerHTML=h+"</table>";
}

function calcLoan(){
    const P=+l_amt.value||0, r=(+l_rt.value/100)/12, n=(+l_yrs.value)*12;
    loanMonthly = pmt(P, r, n);
    document.getElementById('l_res').innerText = loanMonthly ? `החזר חודשי: ${loanMonthly.toFixed(2)} ₪` : "";
    document.getElementById('l_tbl_area').innerHTML = createAmortizationTable(P, r, n);
    updateDash(); save();
}

function calcM(){
    mortMonthly=0; let htmlTables="";
    for(let i=1; i<=3; i++){
        const P=+document.getElementById('m_a'+i).value||0, r=(+document.getElementById('m_r'+i).value/100)/12, n=(+document.getElementById('m_y'+i).value)*12;
        if(P<=0) continue;
        mortMonthly += pmt(P,r,n);
        htmlTables += `<div style="margin-top:10px; font-weight:bold;">מסלול ${i}:</div>` + createAmortizationTable(P, r, n);
    }
    document.getElementById('m_res_summary').innerText = mortMonthly ? `סה"כ החזר: ${mortMonthly.toFixed(2)} ₪` : "";
    document.getElementById('m_tbl_area').innerHTML = htmlTables;
    updateDash(); save();
}

function updateDash(){
    const tInc=incomes.reduce((a,b)=>a+b.val,0), tExp=expenses.reduce((a,b)=>a+b.val,0), tDebt=loanMonthly+mortMonthly, avail=tInc-tExp-tDebt;
    document.getElementById('dash_stats').innerHTML=`הכנסות: ${tInc.toLocaleString()} ₪<br>הוצאות: ${tExp.toLocaleString()} ₪<br>חובות: ${tDebt.toLocaleString()} ₪<br><br><span style="color:${avail>=0?'#2e7d32':'#d32f2f'}">פנוי: ${avail.toLocaleString()} ₪</span>`;
    const ctx = document.getElementById('budgetChart').getContext('2d');
    if (myChart) { myChart.data.datasets[0].data = [tInc, tExp, tDebt]; myChart.update(); }
    else { myChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['הכנסות', 'הוצאות', 'חובות'], datasets: [{ data: [tInc, tExp, tDebt], backgroundColor: ['#4caf50', '#ff9800', '#f44336'], borderWidth: 0 }] }, options: { responsive: true, plugins: { legend: { display: false } } } }); }
}

function save(){
    const data={incomes,expenses,l:{a:l_amt.value,r:l_rt.value,y:l_yrs.value},m1:{a:m_a1.value,r:m_r1.value,y:m_y1.value},m2:{a:m_a2.value,r:m_r2.value,y:m_y2.value},m3:{a:m_a3.value,r:m_r3.value,y:m_y3.value}};
    localStorage.setItem("financeData", JSON.stringify(data));
}

function refresh(){ renderItemsTable('incomes'); renderItemsTable('expenses'); updateDash(); }

window.onload=()=>{
    const d=JSON.parse(localStorage.getItem("financeData"));
    if(d){
        incomes=d.incomes||[]; expenses=d.expenses||[];
        if(d.l){ l_amt.value=d.l.a; l_rt.value=d.l.r; l_yrs.value=d.l.y; }
        for(let i=1;i<=3;i++) if(d['m'+i]){ document.getElementById('m_a'+i).value=d['m'+i].a; document.getElementById('m_r'+i).value=d['m'+i].r; document.getElementById('m_y'+i).value=d['m'+i].y; }
    }
    refresh(); calcLoan(); calcM();
};
function resetAll(){ if(confirm("לאפס הכל?")){ localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
