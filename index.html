<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <link rel="icon" href="icon-192.png" sizes="192x192" type="image/png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שקל לשקל - ניהול תקציב חכם</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');

body { margin: 0; font-family: 'Assistant', sans-serif; background: #f4f7f6; color: #333; transition: 0.3s; min-height: 100vh; }

header { padding: 20px 20px 5px 20px; text-align: center; font-size: 32px; font-weight: 700; color: #1b5e20; }
.logo-container { display: flex; justify-content: center; padding-bottom: 15px; }
.logo-container img { width: 70px; height: 70px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

nav { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 12px; background: #fff; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

button { padding: 10px 14px; border: none; border-radius: 10px; background: linear-gradient(45deg,#43a047,#2e7d32); color: white; cursor: pointer; transition: 0.2s; font-family: inherit; font-weight: 600; display:flex; align-items:center; gap:5px; font-size: 14px;}
button.red { background: linear-gradient(45deg,#e53935,#c62828); }
button.blue { background: linear-gradient(45deg,#1e88e5,#1565c0); }
button.gray { background: linear-gradient(45deg,#757575,#424242); }
button:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.1); }

.section { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
.section.active { display: block; }
.card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }

/* עיצוב הדשבורד עם גרף מוקטן */
.dash-container { display: flex; flex-wrap: wrap; gap: 20px; align-items: center; justify-content: space-around; text-align: right; }
.dash-info { flex: 1; min-width: 200px; }
.chart-box { width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; }

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
.table-container { max-height: 400px; overflow-y: auto; margin-top: 15px; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { border-bottom: 1px solid #eee; padding: 8px; text-align: center; }

.dark { background: #1a1a1a; color: #eee; }
.dark .card { background: #252525; color: #eee; }
.dark input { background: #333; color: #eee; border-color: #444; }
.dark nav { background: #252525; }

.edit-btn { background: #ffa000; color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; }
.delete-btn { background: #d32f2f; color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; }
.toggle-tbl-btn { background: #607d8b; margin: 10px 0; width: 100%; justify-content: center; font-size: 14px; }
.table-content { display: none; margin-top: 10px; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
.table-content.show { display: block; }

footer { text-align: center; padding: 20px; color: #888; font-size: 13px; }
</style>
</head>
<body>

<header>שקל לשקל</header>
<div class="logo-container"><img src="icon-192.png" alt="לוגו שקל לשקל"></div>

<nav>
    <button onclick="showSection('dashboard')">📊 מצב אישי</button>
    <button onclick="showSection('income_section')">💰 הכנסות והוצאות</button>
    <button onclick="showSection('loan_section')">💳 הלוואה</button>
    <button onclick="showSection('mortgage_section')">🏠 משכנתא</button>
    <button onclick="toggleDark()" class="red">🌙 מצב כהה</button>
    <button onclick="resetAll()" class="gray">🧹 איפוס הכל</button>
    <button id="installBtn" class="blue">⬇️ התקנה</button>
</nav>

<div id="dashboard" class="section active">
    <div class="card">
        <h3>סיכום תקציב חודשי</h3>
        <div class="dash-container">
            <div class="dash-info">
                <div id="dash_stats" style="font-size: 18px; font-weight: bold; line-height: 2.2;"></div>
            </div>
            <div class="chart-box">
                <canvas id="budgetChart"></canvas>
            </div>
        </div>
    </div>
</div>

<div id="income_section" class="section">
    <div class="card">
        <h3>ניהול הכנסות</h3>
        <div style="display:flex; gap:10px;"><input type="text" id="inc_name" placeholder="מקור הכנסה"><input type="number" id="inc_val" placeholder="סכום"><button onclick="addItem('incomes')">➕</button></div>
        <div id="inc_table" class="table-container"></div>
    </div>
    <div class="card">
        <h3>ניהול הוצאות</h3>
        <div style="display:flex; gap:10px;"><input type="text" id="exp_name" placeholder="שם ההוצאה"><input type="number" id="exp_val" placeholder="סכום"><button onclick="addItem('expenses')">➕</button></div>
        <div id="exp_table" class="table-container"></div>
    </div>
</div>

<div id="loan_section" class="section">
    <div class="card">
        <h3>מחשבון הלוואה</h3>
        <div class="grid">
            <div><label>סכום ההלוואה</label><input type="number" id="l_amt" oninput="calcLoan(); save();"></div>
            <div><label>ריבית %</label><input type="number" id="l_rt" oninput="calcLoan(); save();"></div>
            <div><label>שנים</label><input type="number" id="l_yrs" oninput="calcLoan(); save();"></div>
        </div>
        <div id="l_res" style="font-size: 20px; color: #d32f2f; margin: 15px 0; font-weight: bold;"></div>
        <div id="l_tbl_area"></div>
    </div>
</div>

<div id="mortgage_section" class="section">
    <div class="card">
        <h3>מחשבון משכנתא</h3>
        <div id="m_tracks">
            <div class="card"><h4>מסלול 1</h4><div class="grid"><input type="number" id="m_a1" placeholder="סכום" oninput="calcM(); save();"><input type="number" id="m_r1" placeholder="ריבית %" oninput="calcM(); save();"><input type="number" id="m_y1" placeholder="שנים" oninput="calcM(); save();"></div></div>
            <div class="card"><h4>מסלול 2</h4><div class="grid"><input type="number" id="m_a2" placeholder="סכום" oninput="calcM(); save();"><input type="number" id="m_r2" placeholder="ריבית %" oninput="calcM(); save();"><input type="number" id="m_y2" placeholder="שנים" oninput="calcM(); save();"></div></div>
            <div class="card"><h4>מסלול 3</h4><div class="grid"><input type="number" id="m_a3" placeholder="סכום" oninput="calcM(); save();"><input type="number" id="m_r3" placeholder="ריבית %" oninput="calcM(); save();"><input type="number" id="m_y3" placeholder="שנים" oninput="calcM(); save();"></div></div>
        </div>
        <div id="m_res_summary" style="font-size: 20px; background: #e8f5e9; padding: 15px; border-radius: 10px; margin-top: 15px; font-weight: bold; text-align: center;"></div>
        <div id="m_tbl_area"></div>
    </div>
</div>

<footer>&copy; 2026 אלכסיי זבודיסקר</footer>

<script>
let deferredPrompt;
let incomes=[], expenses=[], loanMonthly=0, mortMonthly=0;
let myChart = null;

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; });
document.getElementById('installBtn').addEventListener('click', async () => {
    if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; } 
    else { alert("להתקנה: לחץ על שלוש הנקודות בדפדפן ובחר 'הוסף למסך הבית'."); }
});

function showSection(id){ document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function toggleDark(){ document.body.classList.toggle('dark'); }
function pmt(P,r,n){ if(P<=0||n<=0) return 0; if(r===0) return P/n; return (P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1); }

function addItem(type){
    const pre=type==='incomes'?'inc':'exp';
    const name=document.getElementById(pre+'_name').value;
    const val=+document.getElementById(pre+'_val').value;
    if(!name||!val) return;
    (type==='incomes'?incomes:expenses).push({name,val});
    document.getElementById(pre+'_name').value=""; document.getElementById(pre+'_val').value="";
    refresh();
}
function deleteItem(type,idx){ (type==='incomes'?incomes:expenses).splice(idx,1); refresh(); }
function editItem(type,idx){
    const list = type==='incomes' ? incomes : expenses;
    const n = prompt("שם חדש:", list[idx].name);
    const v = prompt("סכום חדש:", list[idx].val);
    if(n) list[idx].name = n;
    if(v && !isNaN(v)) list[idx].val = Number(v);
    refresh();
}
function renderTable(type){
    const list=type==='incomes'?incomes:expenses;
    const container=document.getElementById(type==='incomes'?'inc_table':'exp_table');
    if(!list.length){ container.innerHTML="אין נתונים"; return; }
    let h=`<table><tr><th>שם</th><th>₪</th><th>פעולה</th></tr>`;
    list.forEach((item,i)=> h+=`<tr><td>${item.name}</td><td>${item.val.toLocaleString()}</td><td><button class='edit-btn' onclick="editItem('${type}',${i})">✏️</button><button class='delete-btn' onclick="deleteItem('${type}',${i})">🗑️</button></td></tr>`);
    container.innerHTML=h+"</table>";
}

function calcLoan(){
    const P=+document.getElementById('l_amt').value||0, r=(+document.getElementById('l_rt').value/100)/12, n=(+document.getElementById('l_yrs').value)*12;
    loanMonthly=pmt(P,r,n);
    document.getElementById('l_res').innerText=loanMonthly?`החזר חודשי: ${loanMonthly.toFixed(2)} ₪`:"";
    if(!P){ document.getElementById('l_tbl_area').innerHTML=""; updateDash(); return; }
    let bal=P, h=`<button class="toggle-tbl-btn" onclick="this.nextElementSibling.classList.toggle('show')">📋 לוח סילוקין</button><div class="table-content"><div class="table-container"><table><tr><th>חודש</th><th>תשלום</th><th>יתרה</th></tr>`;
    for(let i=1;i<=n;i++){ bal-=(loanMonthly-(bal*r)); h+=`<tr><td>${i}</td><td>${loanMonthly.toFixed(0)}</td><td>${Math.max(0,bal).toFixed(0)}</td></tr>`; }
    document.getElementById('l_tbl_area').innerHTML=h+"</table></div></div>";
    updateDash();
}

function calcM(){
    mortMonthly=0; let htmlTables="";
    for(let i=1;i<=3;i++){
        const P=+document.getElementById('m_a'+i).value||0, r=(+document.getElementById('m_r'+i).value/100)/12, n=(+document.getElementById('m_y'+i).value)*12;
        if(P<=0||n<=0) continue;
        let pay=pmt(P,r,n); mortMonthly+=pay;
        let bal=P, h=`<button class="toggle-tbl-btn" onclick="this.nextElementSibling.classList.toggle('show')">📋 לוח מסלול ${i}</button><div class="table-content"><div class="table-container"><table><tr><th>חודש</th><th>תשלום</th><th>יתרה</th></tr>`;
        for(let m=1;m<=n;m++){ bal-=(pay-(bal*r)); h+=`<tr><td>${m}</td><td>${pay.toFixed(0)}</td><td>${Math.max(0,bal).toFixed(0)}</td></tr>`; }
        htmlTables += h + "</table></div></div>";
    }
    document.getElementById('m_res_summary').innerText=mortMonthly?`סה"כ החזר חודשי: ${mortMonthly.toFixed(2)} ₪`:"";
    document.getElementById('m_tbl_area').innerHTML=htmlTables;
    updateDash();
}

function updateChart(tInc, tExp, tDebt) {
    const ctx = document.getElementById('budgetChart').getContext('2d');
    if (myChart) {
        myChart.data.datasets[0].data = [tInc, tExp, tDebt];
        myChart.update();
    } else {
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['הכנסות', 'הוצאות', 'חובות'],
                datasets: [{
                    data: [tInc, tExp, tDebt],
                    backgroundColor: ['#4caf50', '#ff9800', '#f44336'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { display: false } }
            }
        });
    }
}

function updateDash(){
    const tInc=incomes.reduce((a,b)=>a+b.val,0), tExp=expenses.reduce((a,b)=>a+b.val,0), tDebt=loanMonthly+mortMonthly, avail=tInc-tExp-tDebt;
    const el=document.getElementById('dash_stats');
    el.innerHTML=`הכנסות: ${tInc.toLocaleString()} ₪<br>הוצאות: ${tExp.toLocaleString()} ₪<br>חובות: ${tDebt.toLocaleString()} ₪<br><br><span style="font-size:1.3em; color:${avail>=0?'#2e7d32':'#d32f2f'}">פנוי: ${avail.toLocaleString()} ₪</span>`;
    updateChart(tInc, tExp, tDebt);
}

function resetAll(){
    if(!confirm("לאפס הכל?")) return;
    localStorage.removeItem("financeData");
    incomes=[]; expenses=[];
    document.querySelectorAll('input').forEach(i => i.value = "");
    refresh(); calcLoan(); calcM();
}

function refresh(){ renderTable('incomes'); renderTable('expenses'); updateDash(); save(); }
function save(){
    const data={incomes,expenses,l:{a:l_amt.value,r:l_rt.value,y:l_yrs.value},m1:{a:m_a1.value,r:m_r1.value,y:m_y1.value},m2:{a:m_a2.value,r:m_r2.value,y:m_y2.value},m3:{a:m_a3.value,r:m_r3.value,y:m_y3.value}};
    localStorage.setItem("financeData",JSON.stringify(data));
}

window.onload=()=>{
    const d=JSON.parse(localStorage.getItem("financeData"));
    if(d){
        incomes=d.incomes||[]; expenses=d.expenses||[];
        if(d.l){ l_amt.value=d.l.a; l_rt.value=d.l.r; l_yrs.value=d.l.y; }
        if(d.m1){ m_a1.value=d.m1.a; m_r1.value=d.m1.r; m_y1.value=d.m1.y; }
        if(d.m2){ m_a2.value=d.m2.a; m_r2.value=d.m2.r; m_y2.value=d.m2.y; }
        if(d.m3){ m_a3.value=d.m3.a; m_r3.value=d.m3.r; m_y3.value=d.m3.y; }
    }
    refresh(); calcLoan(); calcM();
};
</script>
</body>
</html>
