<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<link rel="icon" href="icon-192.png" sizes="192x192" type="image/png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שקל לשקל - ניהול תקציב חכם</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

<style>
body{margin:0;font-family:Arial;background:#f4f7f6;color:#333;transition:.3s}
header{padding:25px;text-align:center;font-size:30px;font-weight:bold;color:#1b5e20}
nav{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:15px;background:#fff;position:sticky;top:0}
button{padding:8px 14px;border:none;border-radius:8px;background:#2e7d32;color:#fff;cursor:pointer}
button.red{background:#c62828}
button.gray{background:#555}
button.blue{background:#1565c0}
.section{display:none;padding:20px;max-width:1100px;margin:auto}
.section.active{display:block}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px}
input{width:100%;padding:8px;margin:5px 0}
.table-container{max-height:350px;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border-bottom:1px solid #ddd;padding:6px;text-align:center}
.dark{background:#121212;color:#eee}
.dark .card{background:#1e1e1e}
.toggle-btn{margin-top:10px;background:#1565c0}
</style>
</head>
<body>

<header>שקל לשקל</header>

<nav>
<button onclick="showSection('dashboard')">📊 מצב אישי</button>
<button onclick="showSection('income_section')">💰 הכנסות והוצאות</button>
<button onclick="showSection('loan_section')">💳 הלוואה</button>
<button onclick="showSection('mortgage_section')">🏠 משכנתא</button>
<button onclick="toggleDark()" class="gray">🌙 מצב כהה</button>
<button onclick="resetAll()" class="red">🧹 איפוס</button>
<button id="installBtn" class="blue">⬇️ התקן</button>
</nav>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<div class="card">
<h3>סיכום תקציב</h3>
<div id="dash_stats"></div>
</div>
</div>

<!-- INCOME EXPENSE -->
<div id="income_section" class="section">
<div class="card">
<h3>הכנסות</h3>
<input type="text" id="inc_name" placeholder="מקור">
<input type="number" id="inc_val" placeholder="סכום">
<button onclick="addItem('incomes')">➕ הוסף</button>
<div id="inc_table" class="table-container"></div>
</div>

<div class="card">
<h3>הוצאות</h3>
<input type="text" id="exp_name" placeholder="שם הוצאה">
<input type="number" id="exp_val" placeholder="סכום">
<button onclick="addItem('expenses')">➕ הוסף</button>
<div id="exp_table" class="table-container"></div>
</div>
</div>

<!-- LOAN -->
<div id="loan_section" class="section">
<div class="card">
<h3>מחשבון הלוואה</h3>
<input type="number" id="l_amt" placeholder="סכום" oninput="calcLoan()">
<input type="number" id="l_rt" placeholder="ריבית שנתית %" oninput="calcLoan()">
<input type="number" id="l_yrs" placeholder="שנים" oninput="calcLoan()">
<div id="l_res" style="margin:10px 0;font-weight:bold"></div>
<div id="l_tbl" class="table-container"></div>
<button id="loanToggleBtn" class="toggle-btn" onclick="toggleLoanSchedule()" style="display:none"></button>
</div>
</div>

<!-- MORTGAGE -->
<div id="mortgage_section" class="section">
<div class="card">
<h3>משכנתא - 3 מסלולים</h3>
<div id="m_tracks"></div>
<div id="m_res"></div>
</div>
</div>

<script>
const APP_VERSION="v4";

if('serviceWorker' in navigator){
window.addEventListener('load',()=>{
navigator.serviceWorker.register('sw.js');
});
}

let incomes=[],expenses=[];
let loanMonthly=0,mortMonthly=0;
let loanSchedule=[],showLoanAll=false;

/* ---------- UI ---------- */
function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
function toggleDark(){document.body.classList.toggle('dark');}

/* ---------- PMT ---------- */
function pmt(P,r,n){
if(P<=0||n<=0)return 0;
if(r===0)return P/n;
return(P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
}

/* ---------- INCOME ---------- */
function addItem(type){
const pre=type==='incomes'?'inc':'exp';
const name=document.getElementById(pre+'_name').value;
const val=+document.getElementById(pre+'_val').value;
if(!name||!val)return;
(type==='incomes'?incomes:expenses).push({name,val});
document.getElementById(pre+'_name').value="";
document.getElementById(pre+'_val').value="";
refreshTables();
}
function renderTable(type){
const list=type==='incomes'?incomes:expenses;
const container=document.getElementById(type==='incomes'?'inc_table':'exp_table');
if(!list.length){container.innerHTML="אין נתונים";return;}
let h="<table><tr><th>שם</th><th>סכום</th></tr>";
list.forEach(item=>{
h+=`<tr><td>${item.name}</td><td>${item.val.toLocaleString()} ₪</td></tr>`;
});
container.innerHTML=h+"</table>";
}
function refreshTables(){
renderTable('incomes');
renderTable('expenses');
updateDash();
}

/* ---------- LOAN ---------- */
function calcLoan(){
const P=+l_amt.value||0;
const r=(+l_rt.value/100)/12;
const n=(+l_yrs.value)*12;
if(!P||!n){l_tbl.innerHTML="";l_res.innerText="";return;}
const pay=pmt(P,r,n);
loanMonthly=pay;
l_res.innerText="החזר חודשי: "+pay.toFixed(2)+" ₪";

let bal=P;
loanSchedule=[];
for(let i=1;i<=n;i++){
let intr=bal*r;
let prn=pay-intr;
bal-=prn;
loanSchedule.push({m:i,p:pay,i:intr,pr:prn,b:Math.max(0,bal)});
if(bal<=0)break;
}
renderLoanSchedule();
updateDash();
}
function renderLoanSchedule(){
let limit=showLoanAll?loanSchedule.length:12;
let h="<table><tr><th>חודש</th><th>תשלום</th><th>ריבית</th><th>קרן</th><th>יתרה</th></tr>";
for(let i=0;i<limit;i++){
let r=loanSchedule[i];
h+=`<tr>
<td>${r.m}</td>
<td>${r.p.toFixed(0)}</td>
<td>${r.i.toFixed(0)}</td>
<td>${r.pr.toFixed(0)}</td>
<td>${r.b.toFixed(0)}</td>
</tr>`;
}
l_tbl.innerHTML=h+"</table>";
if(loanSchedule.length>12){
loanToggleBtn.style.display="block";
loanToggleBtn.innerText=showLoanAll?"הצג פחות":"הצג עוד";
}else{loanToggleBtn.style.display="none";}
}
function toggleLoanSchedule(){showLoanAll=!showLoanAll;renderLoanSchedule();}

/* ---------- MORTGAGE ---------- */
function initMortgage(){
let html="";
for(let i=1;i<=3;i++){
html+=`
<div class="card">
<h4>מסלול ${i}</h4>
<input type="number" id="m_a${i}" placeholder="סכום" oninput="calcM()">
<input type="number" id="m_r${i}" placeholder="ריבית %" oninput="calcM()">
<input type="number" id="m_y${i}" placeholder="שנים" oninput="calcM()">
<div id="m_tbl${i}" class="table-container"></div>
<button id="mToggle${i}" class="toggle-btn" onclick="toggleMSchedule(${i})" style="display:none"></button>
</div>`;
}
m_tracks.innerHTML=html;
}
let mSchedules=[[],[],[]];
let mShow=[false,false,false];

function calcM(){
mortMonthly=0;
for(let i=1;i<=3;i++){
const P=+document.getElementById("m_a"+i).value||0;
const r=(+document.getElementById("m_r"+i).value/100)/12;
const n=(+document.getElementById("m_y"+i).value)*12;
if(!P||!n){document.getElementById("m_tbl"+i).innerHTML="";continue;}
const pay=pmt(P,r,n);
mortMonthly+=pay;
let bal=P;
mSchedules[i-1]=[];
for(let m=1;m<=n;m++){
let intr=bal*r;
let prn=pay-intr;
bal-=prn;
mSchedules[i-1].push({m,pay,intr,prn,bal:Math.max(0,bal)});
if(bal<=0)break;
}
renderMSchedule(i);
}
updateDash();
}
function renderMSchedule(i){
let schedule=mSchedules[i-1];
let limit=mShow[i-1]?schedule.length:12;
let h="<table><tr><th>חודש</th><th>תשלום</th><th>ריבית</th><th>קרן</th><th>יתרה</th></tr>";
for(let x=0;x<limit;x++){
let r=schedule[x];
h+=`<tr>
<td>${r.m}</td>
<td>${r.pay.toFixed(0)}</td>
<td>${r.intr.toFixed(0)}</td>
<td>${r.prn.toFixed(0)}</td>
<td>${r.bal.toFixed(0)}</td>
</tr>`;
}
document.getElementById("m_tbl"+i).innerHTML=h+"</table>";
if(schedule.length>12){
let btn=document.getElementById("mToggle"+i);
btn.style.display="block";
btn.innerText=mShow[i-1]?"הצג פחות":"הצג עוד";
}
}
function toggleMSchedule(i){
mShow[i-1]=!mShow[i-1];
renderMSchedule(i);
}

/* ---------- DASH ---------- */
function updateDash(){
const totalInc=incomes.reduce((a,b)=>a+b.val,0);
const totalExp=expenses.reduce((a,b)=>a+b.val,0);
const totalDebt=loanMonthly+mortMonthly;
const avail=totalInc-totalExp-totalDebt;
dash_stats.innerHTML=
`הכנסות: ${totalInc.toLocaleString()} ₪<br>
הוצאות: ${totalExp.toLocaleString()} ₪<br>
חובות: ${totalDebt.toLocaleString()} ₪<br>
<strong>פנוי: ${avail.toLocaleString()} ₪</strong>`;
dash_stats.style.color=avail>=0?"green":"red";
}

/* ---------- RESET ---------- */
function resetAll(){
incomes=[];expenses=[];
l_amt.value="";l_rt.value="";l_yrs.value="";
refreshTables();
loanSchedule=[];
l_tbl.innerHTML="";
mortMonthly=0;
calcM();
updateDash();
}

window.onload=()=>{
initMortgage();
};
</script>
</body>
</html>
